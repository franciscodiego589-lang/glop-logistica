<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" /><title>Cargyon — offline</title>
<style>body{margin:0;height:100vh;display:grid;place-items:center;font-family:system-ui,sans-serif;background:#0f1830;color:#e9edf7}
.c{text-align:center;padding:2rem}.m{width:64px;height:64px;border-radius:20px;display:grid;place-items:center;font-size:32px;font-weight:900;color:#fff;background:linear-gradient(150deg,#2f56e6,#1a336f);margin:0 auto 1rem}
h1{font-size:1.3rem;margin:.2rem 0}p{color:#93a0bd;font-size:.9rem}</style></head>
<body><div class="c"><div class="m">◈</div><h1>Você está offline</h1>
<p>O Cargyon não conseguiu se conectar. As telas já visitadas continuam disponíveis;<br/>reconecte para sincronizar suas operações de campo.</p>
<button onclick="location.reload()" style="margin-top:1rem;padding:.6rem 1.2rem;border-radius:10px;border:0;background:#2f56e6;color:#fff;font-weight:600;cursor:pointer">Tentar novamente</button>
</div></body></html>
